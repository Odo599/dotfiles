$font = Monospace
$background = /home/odo59/Wallpapers/waves.png

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    color = rgb(0,0,0)
}

input-field {
    monitor =
    size = 40%, 40%
    outline_thickness = 10
    inner_color = rgba(0, 0, 0, 0) # no fill
    outer_color = rgba(255, 255, 255, 0.6)

    hide_input = true

    fade_on_empty = false
    rounding = 15%

    font_family = $font
    placeholder_text =
    fail_text =

    dots_spacing = 0.3

    position = 0, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 150
    font_family = $font

    position = 0, 50
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B" # update every 60 seconds
    font_size = 40
    font_family = $font

    position = 0, -80
    halign = center
    valign = center
}
